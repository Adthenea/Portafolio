    <div id="lightbox" class="lightbox">
        <span class="lightbox-cerrar">&times;</span>
        <img class="lightbox-contenido" id="img-lightbox" alt="Imagen ampliada">
    </div>

    <footer>
        <p>© 2026 Ana arce | Portafolio</p>
    </footer>

    <script>
        const lightbox = document.getElementById('lightbox');
        const imgLightbox = document.getElementById('img-lightbox');
        const cierre = document.querySelector('.lightbox-cerrar');
        const imagenes = document.querySelectorAll('.galeria-item img');

        imagenes.forEach(imagen => {
            imagen.addEventListener('click', () => {
                lightbox.style.display = 'flex';
                imgLightbox.src = imagen.src;
            });
        });

        cierre.addEventListener('click', () => {
            lightbox.style.display = 'none';
        });

        lightbox.addEventListener('click', (e) => {
            if (e.target !== imgLightbox) {
                lightbox.style.display = 'none';
            }
        });
    </script>
